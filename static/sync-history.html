<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/static/theme.js"></script>
  <title>Sync History — QS Analytics</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6366f1;
      --accent2: #818cf8;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --radius: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    .sync-msg { font-size: 12px; color: var(--text2); }
    .sync-msg.ok { color: var(--green); }
    .sync-msg.err { color: var(--red); }

    .btn-sync {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none; cursor: pointer;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      padding: 8px 16px; border-radius: 8px; transition: background 0.15s, opacity 0.15s;
    }
    .btn-sync:hover { background: var(--accent2); }
    .btn-sync:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-sync .btn-sync-icon { display: inline-block; font-size: 14px; line-height: 1; }
    .btn-sync.syncing .btn-sync-icon { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* Stats summary strip */
    .stats-strip {
      display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 24px; flex: 1; min-width: 160px;
    }
    .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .value { font-size: 24px; font-weight: 700; }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.yellow { color: var(--yellow); }
    .stat-card .value.red { color: var(--red); }

    /* Table */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      /* NB: no overflow:hidden — it would become the sticky <th> scroll-container and
         offset the header down by top:var(--qs-nav-h), overlapping the first row. */
    }
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    th {
      background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.4px; padding: 10px 14px; text-align: left;
      position: sticky; top: var(--qs-nav-h); z-index: 5;
      box-shadow: inset 0 -1px 0 var(--border);
    }
    td { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 13px; }
    tr:hover td { background: var(--surface2); }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge-completed { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-failed { background: rgba(239,68,68,0.12); color: var(--red); }
    .badge-running { background: rgba(99,102,241,0.12); color: var(--accent2); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

    .badge-type {
      padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 500;
      text-transform: lowercase;
    }
    .badge-type.full { background: rgba(99,102,241,0.12); color: var(--accent2); }
    .badge-type.incremental { background: rgba(148,163,184,0.12); color: var(--text2); }

    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* Error expand */
    .error-toggle {
      background: none; border: none; color: var(--red); cursor: pointer;
      font-size: 12px; text-decoration: underline; padding: 0;
    }
    .error-toggle:hover { color: #f87171; }
    .error-details {
      display: none; margin-top: 8px; padding: 8px 12px;
      background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15);
      border-radius: 6px; font-size: 11px; font-family: monospace;
      color: var(--text2); max-height: 200px; overflow-y: auto; white-space: pre-wrap;
      word-break: break-all;
    }

    .loading { text-align: center; color: var(--text2); padding: 48px; font-size: 13px; }
    .empty { text-align: center; color: var(--text2); padding: 48px; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Sync History</h1>
    <span id="tz-label" style="font-size: 11px; color: var(--text2); margin-left: 4px;"></span>
  </div>
  <div class="header-right">
    <span id="sync-msg" class="sync-msg"></span>
    <button id="sync-now-btn" class="btn-sync" onclick="triggerSync()">
      <span class="btn-sync-icon">⟳</span> Sync Now
    </button>
  </div>
</header>

<div class="content">
  <div class="stats-strip" id="stats-strip">
    <div class="stat-card"><div class="label">Last Sync</div><div class="value" id="stat-last-sync">–</div></div>
    <div class="stat-card"><div class="label">Status</div><div class="value" id="stat-status">–</div></div>
    <div class="stat-card"><div class="label">Recent Failures (24h)</div><div class="value" id="stat-failures">–</div></div>
    <div class="stat-card"><div class="label">Avg Duration</div><div class="value" id="stat-avg-duration">–</div></div>
    <div class="stat-card"><div class="label">Total Synced (24h)</div><div class="value" id="stat-total-synced">–</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Started</th>
          <th>Type</th>
          <th>Status</th>
          <th class="num">Duration</th>
          <th class="num">Opps Synced</th>
          <th class="num">Errors</th>
        </tr>
      </thead>
      <tbody id="sync-table-body">
        <tr><td colspan="6" class="loading">Loading sync history...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ── Timezone helpers ──
const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const tzAbbr = new Date().toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ').pop();
document.getElementById('tz-label').textContent = `All times in ${tzAbbr} (${userTZ})`;

function fmtDate(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' }) +
    ' ' + tzAbbr;
}

function fmtDuration(secs) {
  if (secs == null) return '–';
  if (secs < 60) return secs + 's';
  const min = Math.floor(secs / 60);
  const sec = Math.round(secs % 60);
  return min + 'm ' + sec + 's';
}

async function loadSyncHistory() {
  try {
    const res = await fetch('/api/dashboard/sync-history?limit=100');
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const { data } = await res.json();

    if (!data || !data.length) {
      document.getElementById('sync-table-body').innerHTML =
        '<tr><td colspan="6" class="empty">No sync runs found.</td></tr>';
      return null;
    }

    // ── Stats ──
    const now = new Date();
    const last24h = data.filter(r => (now - new Date(r.started_at)) < 86400000);
    const failures24h = last24h.filter(r => r.status === 'failed').length;
    const totalSynced24h = last24h.reduce((s, r) => s + (r.opportunities_synced || 0), 0);
    const withDuration = last24h.filter(r => r.duration_seconds != null);
    const avgDuration = withDuration.length
      ? (withDuration.reduce((s, r) => s + r.duration_seconds, 0) / withDuration.length)
      : null;

    // Last sync
    const lastRun = data[0];
    const lastSyncDate = new Date(lastRun.started_at);
    const ageMin = Math.round((now - lastSyncDate) / 60000);
    let lastSyncLabel;
    if (ageMin < 2) lastSyncLabel = 'Just now';
    else if (ageMin < 60) lastSyncLabel = ageMin + ' min ago';
    else if (ageMin < 1440) lastSyncLabel = Math.round(ageMin / 60) + 'h ago';
    else lastSyncLabel = lastSyncDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    document.getElementById('stat-last-sync').textContent = lastSyncLabel;

    const statusEl = document.getElementById('stat-status');
    statusEl.textContent = lastRun.status;
    statusEl.className = 'value ' + (lastRun.status === 'completed' ? 'green' : lastRun.status === 'failed' ? 'red' : '');

    const failEl = document.getElementById('stat-failures');
    failEl.textContent = failures24h;
    failEl.className = 'value ' + (failures24h === 0 ? 'green' : 'red');

    document.getElementById('stat-avg-duration').textContent = avgDuration ? fmtDuration(Math.round(avgDuration)) : '–';
    document.getElementById('stat-total-synced').textContent = totalSynced24h.toLocaleString();

    // Reference run per type (most recent completed) — drives the running-row ETA.
    // Rows arrive sorted newest-first, so the first completed hit per type wins.
    const lastCompletedByType = {};
    data.forEach(r => {
      if (r.status === 'completed' && !lastCompletedByType[r.sync_type]) lastCompletedByType[r.sync_type] = r;
    });

    // ── Table rows ──
    const rows = data.map((run, i) => {
      const typeBadge = `<span class="badge-type ${run.sync_type}">${run.sync_type}</span>`;

      let statusBadge;
      if (run.status === 'completed') {
        statusBadge = `<span class="badge badge-completed">✓ Completed</span>`;
      } else if (run.status === 'failed') {
        statusBadge = `<span class="badge badge-failed">✗ Failed</span>`;
      } else if (run.status === 'cancelled') {
        statusBadge = `<span class="badge badge-failed" style="opacity:0.75;">⊘ Cancelled</span>`;
      } else {
        statusBadge = `<span class="badge badge-running">⟳ Running</span>
          <button onclick="cancelSync('${run.id}')" title="Cancel this sync run"
            style="margin-left:6px; padding:2px 8px; border-radius:5px; border:1px solid var(--red, #ef4444); background:none; color:var(--red, #ef4444); cursor:pointer; font-size:11px; vertical-align:middle;">✕ Cancel</button>`;
      }

      let errorsCell = run.errors_count || 0;
      let errorDetailHtml = '';
      if (run.errors_count > 0 && run.error_details) {
        const detailStr = typeof run.error_details === 'string'
          ? run.error_details
          : JSON.stringify(run.error_details, null, 2);
        errorDetailHtml = `
          <button class="error-toggle" onclick="toggleErrors(${i})">show details</button>
          <div class="error-details" id="err-${i}">${escHtml(detailStr)}</div>
        `;
      }

      // Running rows: live elapsed time + ETA. Progress (opportunities_synced)
      // updates every page now, so prefer a rate-based estimate scaled against
      // the most recent completed run of the same type; before enough progress
      // exists, fall back to that run's duration.
      let durationCell = fmtDuration(run.duration_seconds);
      if (run.status === 'running' && run.started_at) {
        const elapsedS = Math.max(1, Math.round((Date.now() - new Date(run.started_at)) / 1000));
        const ref = lastCompletedByType[run.sync_type];
        let remainingS = null;
        if (ref && run.opportunities_synced > 20 && ref.opportunities_synced > 0) {
          const rate = run.opportunities_synced / elapsedS;  // opps per second
          remainingS = Math.max(0, (ref.opportunities_synced - run.opportunities_synced) / rate);
        } else if (ref && ref.duration_seconds) {
          remainingS = Math.max(0, ref.duration_seconds - elapsedS);
        }
        const etaStr = remainingS !== null
          ? ` · ~${fmtDuration(Math.round(remainingS))} left (ETA ${new Date(Date.now() + remainingS * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })})`
          : '';
        durationCell = `${fmtDuration(elapsedS)}${etaStr}`;
      }

      return `<tr>
        <td>${fmtDate(run.started_at)}</td>
        <td>${typeBadge}</td>
        <td>${statusBadge}</td>
        <td class="num">${durationCell}</td>
        <td class="num">${(run.opportunities_synced || 0).toLocaleString()}</td>
        <td class="num">${errorsCell > 0 ? `<span style="color:var(--red);font-weight:600;">${errorsCell}</span>${errorDetailHtml}` : '0'}</td>
      </tr>`;
    }).join('');

    document.getElementById('sync-table-body').innerHTML = rows;

    return lastRun.status;

  } catch (e) {
    document.getElementById('sync-table-body').innerHTML =
      `<tr><td colspan="6" class="empty">Failed to load sync history: ${e.message}</td></tr>`;
    return undefined;
  }
}

function toggleErrors(idx) {
  const el = document.getElementById('err-' + idx);
  el.style.display = el.style.display === 'none' || !el.style.display ? 'block' : 'none';
}

async function cancelSync(runId) {
  if (!confirm('Cancel this sync run? A live run stops within seconds; the row is closed immediately.')) return;
  try {
    const res = await fetch(`/api/sync/cancel/${runId}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SYNC_TOKEN}` },
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    await loadSyncHistory();
  } catch (e) {
    alert('Cancel failed: ' + e.message);
  }
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Manual sync trigger ──
const SYNC_TOKEN = "{{ api_token }}";
let pollTimer = null;

function reflectStatus(status) {
  const btn = document.getElementById('sync-now-btn');
  const running = status === 'running';
  btn.disabled = running;
  btn.classList.toggle('syncing', running);
  if (running) {
    startPolling();
  } else {
    stopPolling();
  }
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    const status = await loadSyncHistory();
    if (status !== 'running') {
      stopPolling();
      const btn = document.getElementById('sync-now-btn');
      btn.disabled = false;
      btn.classList.remove('syncing');
      if (status === 'completed') setMsg('Sync completed.', 'ok');
      else if (status === 'failed') setMsg('Sync failed — see the latest row.', 'err');
    }
  }, 10000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function setMsg(text, kind) {
  const el = document.getElementById('sync-msg');
  el.textContent = text;
  el.className = 'sync-msg' + (kind ? ' ' + kind : '');
}

async function triggerSync() {
  const btn = document.getElementById('sync-now-btn');
  btn.disabled = true;
  btn.classList.add('syncing');
  setMsg('Starting full sync…', '');
  try {
    const res = await fetch('/api/sync/trigger?sync_type=full', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SYNC_TOKEN}` },
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    setMsg('Full sync running…', '');
    await loadSyncHistory();
    startPolling();
  } catch (e) {
    setMsg(`Failed to start sync: ${e.message}`, 'err');
    btn.disabled = false;
    btn.classList.remove('syncing');
  }
}

// Initial load — reflect a sync already in progress on the button.
loadSyncHistory().then(reflectStatus);
</script>
<script src="/static/tooltip.js"></script>
<script src="/static/nav.js"></script>
</body>
</html>
